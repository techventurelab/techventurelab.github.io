<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithBot AI - Demo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f6;
        }
        /* বটপ্রেসের পপ-আপ কন্টেইনারকে জোর করে ফুল স্ক্রিন করার সিএসএস */
        #bp-web-widget-container iframe {
            max-height: 100% !important;
            max-width: 100% !important;
            width: 100% !important;
            height: 100% !important;
            bottom: 0 !important;
            right: 0 !important;
        }
    </style>
</head>
<body>

    <!-- 🛑 এখানে আপনার বটপ্রেসের মেইন ২/৩ লাইনের <script src="..."></script> কোডটি পেস্ট করবেন 🛑 -->


    <!-- 💡 বট ওপেন করার জন্য স্ক্রিপ্ট ট্রিক -->
    <script>
        window.botpressWebChat.onEvent(function () {
            window.botpressWebChat.sendEvent({ type: 'show' });
        }, ['lifecycleLoaded']);
    </script>

</body>
</html>
