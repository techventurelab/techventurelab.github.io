<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithBot AI - Demo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f6;
        }
        /* বটপ্রেস কন্টেইনারকে জোর করে স্ক্রিনের মাঝে ফুল-স্ক্রিন করার সিএসএস */
        .bpw-layout {
            width: 100% !important;
            height: 100% !important;
            max-height: 100% !important;
            max-width: 100% !important;
            border-radius: 0 !important;
        }
        #bp-web-widget-container iframe {
            max-height: 100% !important;
            max-width: 100% !important;
            width: 100% !important;
            height: 100% !important;
            bottom: 0 !important;
            right: 0 !important;
            left: 0 !important;
            top: 0 !important;
            position: fixed !important;
        }
    </style>
</head>
<body>

    <!-- ১. বটপ্রেসের ইনজেক্ট স্ক্রিপ্ট -->
    <script src="https://cdn.botpress.cloud/webchat/v3/inject.js"></script>
    
    <!-- ২. আপনার বটের ইউনিক কনফিগারেশন স্ক্রিপ্ট -->
    <script src="https://files.bpcontent.cloud/2026/06/12/20260607125414-7OHTH3ZR.js" defer></script>

    <!-- ৩. কোনো ইভেন্টের ঝামেলা ছাড়াই পেজ লোড হওয়ার ২ সেকেন্ড পর বট ওপেন করার সেফ জাভাস্ক্রিপ্ট -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (window.botpressWebChat) {
                    window.botpressWebChat.sendEvent({ type: 'show' });
                }
            }, 1500); // ১.৫ সেকেন্ডের একটা সেফ টাইমার যাতে স্ক্রিপ্ট লোড হওয়ার সময় পায়
        });
    </script>

</body>
</html>
