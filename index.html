<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithBot AI - Demo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f6;
        }
        /* এম্বেড করা চ্যাটবটকে পুরো স্ক্রিন জুড়ে দেখানোর সিএসএস */
        #bp-webchat {
            width: 100% !important;
            height: 100% !important;
        }
        iframe {
            border: none !important;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <!-- ১. বটপ্রেসের চ্যাট উইন্ডোটি এই কন্টেইনারের ভেতর ফুল-স্ক্রিন হয়ে লোড হবে -->
    <div id="bp-webchat"></div>

    <!-- ২. আপনার বটপ্রেসের ইনজেক্ট স্ক্রিপ্ট -->
    <script src="https://cdn.botpress.cloud/webchat/v3/js/inject.js"></script>
    
    <!-- ৩. আপনার বটের ইউনিক কনফিগারেশন স্ক্রিপ্ট (এম্বেড মোডের জন্য কাস্টমাইজড) -->
    <script src="https://files.bpcontent.cloud/2026/06/12/20260607125414-7OHTH3ZR.js" defer></script>

    <!-- ৪. পেজ লোড হওয়া মাত্রই বটকে কন্টেইনারের ভেতর ফুল-স্ক্রিন করার জাভাস্ক্রিপ্ট -->
    <script>
        window.botpressWebChat.onEvent(function () {
            window.botpressWebChat.sendEvent({ type: 'show' });
        }, ['lifecycleLoaded']);
    </script>

</body>
</html>
